<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>히라가나 오십음도표 빈칸 채우기</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Klee One', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; padding: 0; margin: 0; overflow: hidden;
        }
        .container {
            background: #2d5a5a; border-radius: 20px; padding: 1.5vh 1.5vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 95vw; height: 95vh; max-width: 1920px; max-height: 1080px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            background: white; border-radius: 15px; padding: 1vh 2vw;
            margin-bottom: 1.5vh; display: flex; justify-content: center;
            align-items: center; position: relative; flex-shrink: 0; min-height: 0;
        }
        .header-center { display: flex; align-items: center; gap: 15px; }
        .title {
            font-size: 2vw; color: #2d5a5a; font-weight: 700;
            font-family: 'Libre Baskerville', serif; white-space: nowrap;
        }
        .reset-btn {
            width: 3vh; height: 3vh; min-width: 30px; min-height: 30px;
            background: #2d5a5a; border: none; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(45,90,90,0.3); flex-shrink: 0;
        }
        .reset-btn:hover { transform: translateY(-2px) rotate(90deg); box-shadow: 0 6px 20px rgba(45,90,90,0.4); }
        .reset-btn:active { transform: translateY(0) rotate(90deg); }
        .reset-btn svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .timer {
            font-size: 1.8vw; color: #2d5a5a; font-weight: 600;
            font-family: 'Libre Baskerville', serif; white-space: nowrap;
            position: absolute; right: 2vw;
        }
        .game-area { display: flex; gap: 1.5vw; align-items: stretch; flex: 1; min-height: 0; overflow: hidden; }
        .left-panel {
            flex: 2; background: white; border-radius: 15px; padding: 1vh;
            display: flex; flex-direction: column; min-height: 0; overflow: hidden;
        }
        .hiragana-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5vh;
            grid-auto-rows: 1fr; flex: 1; min-height: 0;
        }
        .cell {
            border-radius: 10px; display: flex; justify-content: center; align-items: center;
            font-size: 2vw; cursor: pointer; transition: all 0.3s ease; font-weight: 600;
        }
        .cell.empty { background: white; border: 2px solid #d4b5f0; }
        .cell.filled { background: #e8d4f8; border: 2px solid #d4b5f0; }
        .cell.matched { background: #c8b6e2; border: 2px solid #a89cc9; color: #4a4a4a; }
        .cell.blank { background: white; border: none; cursor: default; }
        .cell.selected { transform: scale(0.95); box-shadow: inset 0 4px 8px rgba(0,0,0,0.2); }
        .cell.n-box { background: #c8b6e2; border: 2px solid #a89cc9; color: #4a4a4a; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.5s; }
        .right-panel {
            flex: 1; background: white; border-radius: 15px; padding: 1vh;
            display: flex; flex-direction: column; min-height: 0; overflow: hidden;
        }
        .chars-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5vh;
            grid-auto-rows: 1fr; flex: 1; min-height: 0;
        }
        .char-tile {
            background: #ffd4d4; border: 2px solid #ffb8b8; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2vw; cursor: pointer; transition: all 0.3s ease;
            font-weight: 600; color: #4a4a4a; min-height: 0;
        }
        .char-tile:hover { background: #ffbbbb; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .char-tile:active { transform: scale(0.95); }
        .char-tile.used { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .char-tile.selected { transform: scale(0.95); box-shadow: inset 0 4px 8px rgba(0,0,0,0.2); }
        .confetti { position: fixed; width: 12px; height: 12px; top: -10px; z-index: 9999; pointer-events: none; border-radius: 2px; }
        @keyframes confetti-fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-center">
            <h1 class="title">히라가나 오십음도표 빈칸 채우기</h1>
            <button class="reset-btn" onclick="resetGame()">
                <svg viewBox="0 0 24 24">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                </svg>
            </button>
        </div>
        <div class="timer" id="timer">00:00</div>
    </div>
    <div class="game-area">
        <div class="left-panel">
            <div class="hiragana-grid" id="grid"></div>
        </div>
        <div class="right-panel">
            <div class="chars-grid" id="chars"></div>
        </div>
    </div>
</div>

<script>
    // ── Ryuu-spec/Hiragana-Audio (jsDelivr CDN) 매핑 ─────────────────
    const BASE = 'https://cdn.jsdelivr.net/gh/Ryuu-spec/Hiragana-Audio@main/audio/';
    const audioMap = {
        'あ':'01_a',  'い':'02_i',  'う':'03_u',  'え':'04_e',  'お':'05_o',
        'か':'06_ka', 'き':'07_ki', 'く':'08_ku', 'け':'09_ke', 'こ':'10_ko',
        'さ':'11_sa', 'し':'12_si', 'す':'13_su', 'せ':'14_se', 'そ':'15_so',
        'た':'16_ta', 'ち':'17_ti', 'つ':'18_tu', 'て':'19_te', 'と':'20_to',
        'な':'21_na', 'に':'22_ni', 'ぬ':'23_nu', 'ね':'24_ne', 'の':'25_no',
        'は':'26_ha', 'ひ':'27_hi', 'ふ':'28_fu', 'へ':'29_he', 'ほ':'30_ho',
        'ま':'31_ma', 'み':'32_mi', 'む':'33_mu', 'め':'34_me', 'も':'35_mo',
        'や':'36_ya', 'ゆ':'37_yu', 'よ':'38_yo',
        'ら':'39_ra', 'り':'40_ri', 'る':'41_ru', 'れ':'42_re', 'ろ':'43_ro',
        'わ':'44_wa', 'を':'45_wo', 'ん':'46_n'
    };

    function playHiragana(char) {
        const file = audioMap[char];
        if (!file) return;
        const audio = new Audio(BASE + file + '.mp3');
        audio.play().catch(() => {});
    }

    // ── 효과음 ────────────────────────────────────────────────────────
    function playCorrectSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 523.25; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
    }

    function playIncorrectSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 200; osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    }

    function playCelebrationSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; osc.type = 'sine';
            const t = ctx.currentTime + i * 0.15;
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        });
    }

    function createConfetti() {
        const colors = ['#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#a29bfe','#fd79a8'];
        const shapes = ['●','■','★'];
        for (let i = 0; i < 100; i++) {
            const el = document.createElement('div');
            el.className = 'confetti';
            el.textContent = shapes[Math.floor(Math.random() * 3)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.fontSize = (Math.random() * 15 + 12) + 'px';
            el.style.animation = `confetti-fall ${Math.random()*3+2}s ${Math.random()*0.5}s linear forwards`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }
    }

    // ── 50음도 데이터 ─────────────────────────────────────────────────
    const fullHiraganaTable = [
        ['あ','い','う','え','お'],
        ['か','き','く','け','こ'],
        ['さ','し','す','せ','そ'],
        ['た','ち','つ','て','と'],
        ['な','に','ぬ','ね','の'],
        ['は','ひ','ふ','へ','ほ'],
        ['ま','み','む','め','も'],
        ['や','blank','ゆ','blank','よ'],
        ['ら','り','る','れ','ろ'],
        ['わ','blank','blank','blank','を','ん-box']
    ];

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function generateRandomLayout() {
        const allPos = [];
        fullHiraganaTable.forEach((row, ri) => {
            row.forEach((char, ci) => {
                if (char !== 'blank' && char !== 'ん-box')
                    allPos.push({ row: ri, col: ci, char });
            });
        });
        const hidden = shuffleArray(allPos).slice(27);
        const newTable = fullHiraganaTable.map(r => [...r]);
        const answerMap = {}, charsList = [];
        hidden.forEach(p => {
            newTable[p.row][p.col] = '';
            answerMap[`${p.row}-${p.col}`] = p.char;
            charsList.push(p.char);
        });
        return { table: newTable, answerMap, charsList };
    }

    let currentLayout = generateRandomLayout();
    let hiraganaTable = currentLayout.table;
    let answerMap = currentLayout.answerMap;
    let charsListOriginal = currentLayout.charsList;

    let selectedCell = null, selectedChar = null;
    let timerInterval = null, startTime = null;
    let usedChars = new Set(), isTimerStarted = false;

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        hiraganaTable.forEach((row, ri) => {
            row.forEach((char, ci) => {
                const cell = document.createElement('div');
                cell.className = 'cell';

                if (char === 'blank') {
                    cell.classList.add('blank');
                } else if (char === 'ん-box') {
                    cell.classList.add('filled', 'n-box');
                    cell.textContent = 'ん';
                    cell.addEventListener('click', () => playHiragana('ん'));
                } else if (char === '') {
                    cell.classList.add('empty');
                    cell.dataset.row = ri;
                    cell.dataset.col = ci;
                    cell.addEventListener('click', () => selectCell(cell));
                } else {
                    cell.classList.add('filled', 'matched');
                    cell.textContent = char;
                    // 이미 채워진 글자 → 클릭 시 발음
                    cell.addEventListener('click', () => playHiragana(char));
                }

                grid.appendChild(cell);
            });
        });

        const charsPanel = document.getElementById('chars');
        charsPanel.innerHTML = '';
        shuffleArray(charsListOriginal).forEach(char => {
            const tile = document.createElement('div');
            tile.className = 'char-tile';
            tile.textContent = char;
            tile.dataset.char = char;
            tile.addEventListener('click', () => selectCharTile(tile, char));
            charsPanel.appendChild(tile);
        });
    }

    function selectCell(cell) {
        if (cell.classList.contains('matched')) return;
        if (!isTimerStarted) { startTimer(); isTimerStarted = true; }
        if (selectedCell && selectedCell !== cell) selectedCell.classList.remove('selected');
        selectedCell = cell;
        cell.classList.add('selected');
        if (selectedChar) tryMatch();
    }

    function selectCharTile(tile, char) {
        if (tile.classList.contains('used')) return;
        if (!isTimerStarted) { startTimer(); isTimerStarted = true; }

        // 오른쪽 타일 클릭 시 발음 재생
        playHiragana(char);

        const prev = document.querySelector('.char-tile.selected');
        if (prev && prev !== tile) prev.classList.remove('selected');
        selectedChar = { tile, char };
        tile.classList.add('selected');
        if (selectedCell) tryMatch();
    }

    function tryMatch() {
        const key = `${selectedCell.dataset.row}-${selectedCell.dataset.col}`;
        if (answerMap[key] === selectedChar.char) {
            playCorrectSound();
            const matchedChar = selectedChar.char;

            selectedCell.textContent = matchedChar;
            selectedCell.classList.remove('empty', 'selected');
            selectedCell.classList.add('matched');
            selectedCell.addEventListener('click', () => playHiragana(matchedChar));

            selectedChar.tile.classList.add('used');
            selectedChar.tile.classList.remove('selected');
            usedChars.add(matchedChar);
            selectedCell = null; selectedChar = null;
            checkComplete();
        } else {
            playIncorrectSound();
            selectedCell.classList.add('shake');
            selectedChar.tile.classList.add('shake');
            setTimeout(() => {
                selectedCell.classList.remove('shake', 'selected');
                selectedChar.tile.classList.remove('shake', 'selected');
                selectedCell = null; selectedChar = null;
            }, 500);
        }
    }

    function checkComplete() {
        if (document.querySelectorAll('.cell.empty').length === 0) {
            stopTimer();
            playCelebrationSound();
            createConfetti();
        }
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const s = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').textContent =
                `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); }

    function resetGame() {
        selectedCell = null; selectedChar = null;
        usedChars.clear(); isTimerStarted = false;
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer').textContent = '00:00';
        currentLayout = generateRandomLayout();
        hiraganaTable = currentLayout.table;
        answerMap = currentLayout.answerMap;
        charsListOriginal = currentLayout.charsList;
        initGame();
    }

    initGame();
</script>
</body>
</html>
